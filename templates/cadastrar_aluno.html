<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastrar Aluno</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --sidebar:#c6ff00;
  --bg:#2f343c;
  --card:#e5e5e5;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Poppins;
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
  background:var(--bg);
}

.sidebar{
  background:var(--sidebar);
  padding:20px;
}

.brand img{
  width:120px;
}

.profile{
  text-align:center;
  margin-top:20px;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background-size:cover;
  margin:auto;
  background-image:url("/static/avatar_padrao.png");
}

.user-name{
  margin-top:8px;
  font-weight:600;
}

.btn-side{
  display:block;
  margin-top:12px;
  padding:10px;
  background:#fff;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  color:#000;
  font-weight:600;
}

.content{
  padding:30px;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:12px;
  max-width:1000px;
  margin:auto;
}

h2{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

input, select{
  padding:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.add{
  background:#9cff57;
}

.save{
  background:#d9d9d9;
}

.aluno{
  margin-bottom:10px;
  border-bottom:1px solid #999;
  padding-bottom:10px;
}

</style>

<script>

let index = 1;

function addAluno(){

  const div = document.createElement("div");

  div.className = "aluno";

  div.innerHTML = `

  <div class="grid">

  <input name="nome[]" placeholder="Nome">

  <input name="login[]" placeholder="Email">

  <input name="senha[]" placeholder="Senha">

  <select name="setor[]">

  <option>Operações</option>
  <option>Manutenção</option>
  <option>SGSO</option>
  <option>Administrativo</option>
  <option>Outros</option>

  </select>

  </div>

  `;

  document.getElementById("lista").appendChild(div);

}

</script>

</head>


<body>


<aside class="sidebar">

<div class="brand">
<img src="{{ url_for('static', filename='loggo.png') }}">
</div>

<div class="profile">

<div class="avatar"></div>

<div class="user-name">
{{ session.get('nome','USUARIO')|upper }}
</div>

</div>

<a class="btn-side" href="/">Home</a>

</aside>


<main class="content">

<div class="card">

<h2>Cadastrar Alunos</h2>

<form method="post">

<div id="lista">

<div class="aluno">

<div class="grid">

<input name="nome[]" placeholder="Nome">

<input name="login[]" placeholder="Email">

<input name="senha[]" placeholder="Senha">

<select name="setor[]">

<option>Operações</option>
<option>Manutenção</option>
<option>SGSO</option>
<option>Administrativo</option>
<option>Outros</option>

</select>

</div>

</div>

</div>


<button type="button" class="add" onclick="addAluno()">
+ Adicionar aluno
</button>

<br><br>

<button class="save" type="submit">
Salvar Todos
</button>

</form>

</div>

</main>

</body>
</html>
