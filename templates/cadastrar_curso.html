<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Curso</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#2b2f36;
  --sidebar:#ccff00;
  --border:#d1d5db;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:var(--bg);
  display:grid;
  grid-template-columns:260px 1fr;
}


/* SIDEBAR */

.sidebar{
  background:var(--sidebar);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.brand{
  display:flex;
  justify-content:center;
}

.brand img{
  height:40px;
}


.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.avatar{
  width:86px;
  height:86px;
  border-radius:50%;
  background:url('{{ url_for("static", filename="avatar_padrao.png") }}') center/cover no-repeat;
  border:3px solid #fff;
}

.user-name{
  color:#000;
  font-weight:700;
  text-transform:uppercase;
}


.btn{
  width:100%;
  padding:10px;
  border-radius:8px;
  background:#fff;
  border:1px solid #ccc;
  color:#000;
  text-align:center;
  font-weight:600;
  text-decoration:none;
  cursor:pointer;
}

.btn:hover{
  background:#f3f4f6;
}

.btn.secondary{
  background:#fff;
}


/* CONTENT */

.content{
  background:#2b2f36;
  padding:25px;
}


.breadcrumb{
  color:#9ca3af;
  font-size:12px;
}

.page-title{
  color:#fff;
  font-size:24px;
  font-weight:700;
  margin-bottom:10px;
}


/* CARD */

.card{
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}


.grid{
  display:grid;
  gap:14px;
}

.grid.cols-2{
  grid-template-columns:1fr 1fr;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field input,
.field select,
.field textarea{
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}


#modulos .modulo,
#perguntas .pergunta{
  background:#f3f4f6;
  border:1px solid #ddd;
  border-radius:8px;
  padding:12px;
  margin-bottom:10px;
}

.btn-danger{
  background:#dc3545;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 10px;
  cursor:pointer;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions .btn{
  flex:1;
}

</style>
</head>

<body>


<aside class="sidebar">

<div class="brand">
<img src="{{ url_for('static', filename='loggo.png') }}">
</div>

<div class="profile">
<div class="avatar"></div>
<div class="user-name">
{{ (session['nome'] or 'USUÁRIO') | upper }}
</div>
</div>

<a class="btn" href="/alterar_senha">Alterar Senha</a>
<a class="btn secondary" href="/">Home do Professor</a>

</aside>



<main class="content">

<div class="breadcrumb">
Início / Professor / Cadastro de Curso
</div>

<div class="page-title">
Cadastro de Curso
</div>


<section class="card">

<h3>Informações do Curso</h3>

<form method="post" enctype="multipart/form-data">

<div class="grid cols-2">


<div class="field">
<label>Nome do Curso</label>

<div style="display:flex;gap:8px;">

<select id="nome" name="nome" required style="flex:1;">
<option value="">-- Selecione --</option>
<option>Doutrinamento Básico de Solo</option>
<option>Conhecimentos Gerais</option>
<option>Emergências Gerais</option>
<option>SGSO</option>
</select>

<button type="button" class="btn" style="width:40px;" onclick="mostrarNovoCurso()">+</button>

</div>

<input type="text" id="novoCurso"
placeholder="Novo curso"
style="display:none;margin-top:8px;"
onblur="adicionarNovoCurso()">

</div>



<div class="field">
<label>Carga Horária</label>
<input type="text" name="carga_horaria" required>
</div>



<div class="field">
<label>Setor do Curso</label>

<select name="setor" required>
<option value="">--</option>
<option>Operações</option>
<option>Manutenção</option>
<option>SGSO</option>
<option>Administrativo</option>
<option>Outros</option>
</select>

</div>



<div class="field" style="grid-column:1/-1">
<label>Conteúdo</label>
<textarea name="conteudo"></textarea>
</div>


</div>



<div class="section-title">Módulos</div>

<div id="modulos"></div>

<button type="button" class="btn" onclick="adicionarModulo()">
Adicionar Módulo
</button>



<div class="section-title">Avaliação</div>

<div id="perguntas"></div>

<button type="button" class="btn" id="adicionarPergunta">
Adicionar Pergunta
</button>



<div class="actions">

<input type="submit" class="btn" value="Cadastrar Curso">

<a class="btn secondary" href="/">
Cancelar
</a>

</div>


</form>

</section>

</main>


<script>

/* JS ORIGINAL — NÃO ALTERADO */

function mostrarNovoCurso(){
  const campo=document.getElementById("novoCurso");
  campo.style.display="block";
  campo.focus();
}

function adicionarNovoCurso(){
  const input=document.getElementById("novoCurso");
  const nome=input.value.trim();
  const select=document.getElementById("nome");

  if(nome){
    const opt=document.createElement("option");
    opt.value=nome;
    opt.textContent=nome;
    select.appendChild(opt);
    select.value=nome;
  }

  input.value="";
  input.style.display="none";
}

let indexModulo=0;

function adicionarModulo(){

  const c=document.getElementById("modulos");

  const d=document.createElement("div");

  d.className="modulo";

  d.innerHTML=`

<input type="text"
name="modulos[${indexModulo}][titulo]"
placeholder="Título">

<input type="file"
name="modulos[${indexModulo}][arquivo]">

<button type="button"
class="btn-danger"
onclick="this.closest('.modulo').remove()">

Remover

</button>

`;

  c.appendChild(d);

  indexModulo++;

}


let indicePergunta=0;

document.getElementById("adicionarPergunta").onclick=function(){

  const c=document.getElementById("perguntas");

  const d=document.createElement("div");

  d.className="pergunta";

  d.innerHTML=`

<input type="text"
name="perguntas[${indicePergunta}][enunciado]"
placeholder="Pergunta">

<input type="text"
name="perguntas[${indicePergunta}][a]">

<input type="text"
name="perguntas[${indicePergunta}][b]">

<input type="text"
name="perguntas[${indicePergunta}][c]">

<input type="text"
name="perguntas[${indicePergunta}][d]">

<select name="perguntas[${indicePergunta}][correta]">

<option>a</option>
<option>b</option>
<option>c</option>
<option>d</option>

</select>

`;

  c.appendChild(d);

  indicePergunta++;

}

</script>


</body>
</html>
