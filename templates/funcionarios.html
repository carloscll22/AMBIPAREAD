<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciar Funcionários</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --sidebar:#ccff00;
  --bg:#2b2f36;
  --surface:#ffffff;
  --border:#ddd;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}


/* SIDEBAR */

.sidebar{
  background:var(--sidebar);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.brand{
  text-align:center;
}

.brand img{
  height:40px;
}

.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:url('{{ url_for("static", filename="avatar_padrao.png") }}') center/cover no-repeat;
  border:3px solid #fff;
}

.user-name{
  font-weight:700;
  color:#000;
}

.btn{
  width:100%;
  padding:10px;
  border-radius:8px;
  background:#fff;
  border:1px solid #ccc;
  text-align:center;
  text-decoration:none;
  color:#000;
  font-weight:600;
}

.btn:hover{
  background:#f3f3f3;
}


/* CONTENT */

.content{
  padding:30px;
  background:#2b2f36;
}


/* CARD */

.card{
  background:#fff;
  padding:25px;
  border-radius:14px;
  max-width:1100px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  font-weight:600;
  color:#000;
}


/* FILTRO */

.filter{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter input,
.filter select{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

.filter button{
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#fff;
  font-weight:600;
  cursor:pointer;
}

.filter a{
  align-self:center;
  text-decoration:none;
  font-weight:600;
  color:#000;
}


/* TABELA */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
}

th{
  background:#f3f3f3;
}

.actions{
  display:flex;
  gap:10px;
}

.btn-edit{
  color:#2563eb;
  text-decoration:none;
  font-weight:600;
}

.btn-del{
  color:#b91c1c;
  border:none;
  background:none;
  cursor:pointer;
  font-weight:600;
}

</style>
</head>


<body>


<aside class="sidebar">

<div class="brand">
<img src="{{ url_for('static', filename='loggo.png') }}">
</div>

<div class="profile">
<div class="avatar"></div>
<div class="user-name">
{{ session['nome'] }}
</div>
</div>

<a class="btn" href="/alterar_senha">Alterar Senha</a>
<a class="btn" href="/">Home</a>

</aside>



<main class="content">


<div class="card">

<div class="top">
<h2>Funcionários Cadastrados</h2>
<a class="back" href="/">← Voltar</a>
</div>


<form method="get" class="filter">

<input
type="text"
name="nome"
placeholder="Buscar por nome"
value="{{ nome_filtro }}"
>

<select name="setor">

<option value="">Todos os setores</option>

<option value="Manutenção"
{% if setor_filtro == 'manutenção' %}selected{% endif %}>
Manutenção
</option>

<option value="Operações"
{% if setor_filtro == 'operações' %}selected{% endif %}>
Operações
</option>

<option value="SGSO"
{% if setor_filtro == 'sgso' %}selected{% endif %}>
SGSO
</option>

<option value="Administrativo"
{% if setor_filtro == 'administrativo' %}selected{% endif %}>
Administrativo
</option>

<option value="Outros"
{% if setor_filtro == 'outros' %}selected{% endif %}>
Outros
</option>

</select>

<button type="submit">Filtrar</button>

<a href="/funcionarios">Limpar</a>

</form>



<table>

<thead>

<tr>
<th>Nome</th>
<th>Email</th>
<th>Tipo</th>
<th>Categoria</th>
<th>Ações</th>
</tr>

</thead>

<tbody>

{% for email, u in usuarios.items() %}
{% if u.tipo == "aluno" %}

<tr>

<td>{{ u.nome }}</td>

<td>{{ email }}</td>

<td>{{ u.tipo }}</td>

<td>{{ u.categoria or '-' }}</td>

<td class="actions">

<a class="btn-edit"
href="/funcionarios/editar/{{ email }}">
Editar
</a>

<form
method="post"
action="/funcionarios/excluir/{{ email }}"
onsubmit="return confirm('Excluir este funcionário?');"
>

<button class="btn-del">
Excluir
</button>

</form>

</td>

</tr>

{% endif %}
{% endfor %}

</tbody>

</table>


</div>

</main>

</body>
</html>
