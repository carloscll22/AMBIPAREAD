<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciar Funcionários</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:Poppins,sans-serif;
  background:#c1f38e;
  padding:40px;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:12px;
  max-width:1100px;
  margin:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  font-weight:600;
  color:#000;
}


/* FILTRO */

.filter{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter input,
.filter select{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.filter button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#a0e76d;
  font-weight:600;
  cursor:pointer;
}

.filter a{
  text-decoration:none;
  font-weight:600;
  color:#000;
  align-self:center;
}


/* TABELA */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
}

th{
  background:#f3f3f3;
}

.actions{
  display:flex;
  gap:10px;
}

.btn-edit{
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}

.btn-del{
  color:#b91c1c;
  border:none;
  background:none;
  cursor:pointer;
  font-weight:600;
}

</style>
</head>

<body>

<div class="card">

  <div class="top">
    <h2>Funcionários Cadastrados</h2>
    <a class="back" href="/">← Voltar</a>
  </div>


  <!-- FILTRO -->

  <form method="get" class="filter">

    <input
      type="text"
      name="nome"
      placeholder="Buscar por nome"
      value="{{ nome_filtro }}"
    >

    <select name="setor">

      <option value="">Todos os setores</option>

      <option value="Manutenção">Manutenção</option>
      <option value="Operações">Operações</option>
      <option value="SGSO">SGSO</option>
      <option value="Administrativo">Administrativo</option>
      <option value="Outros">Outros</option>

    </select>

    <button type="submit">Filtrar</button>

    <a href="/funcionarios">Limpar</a>

  </form>


  <!-- TABELA -->

  <table>

    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Tipo</th>
        <th>Categoria</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>

      {% for email, u in usuarios.items() %}
      {% if u.tipo == "aluno" %}

      <tr>

        <td>{{ u.nome }}</td>
        <td>{{ email }}</td>
        <td>{{ u.tipo }}</td>
        <td>{{ u.categoria or '-' }}</td>

        <td class="actions">

          <a class="btn-edit"
             href="/funcionarios/editar/{{ email }}">
             Editar
          </a>

          <form method="post"
                action="/funcionarios/excluir/{{ email }}"
                onsubmit="return confirm('Excluir este funcionário?');">

            <button class="btn-del">
              Excluir
            </button>

          </form>

        </td>

      </tr>

      {% endif %}
      {% endfor %}

    </tbody>

  </table>

</div>

</body>
</html>
