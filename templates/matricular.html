<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Matricular Aluno</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --sidebar:#c6ff00;
  --bg:#2f343c;
  --card:#e5e5e5;
  --border:#ccc;
  --primary:#a0e76d;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Poppins;
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
  background:var(--bg);
}

/* SIDEBAR */

.sidebar{
  background:var(--sidebar);
  padding:20px;
}

.brand img{
  width:120px;
}

.profile{
  text-align:center;
  margin-top:20px;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background-size:cover;
  margin:auto;
}

.user-name{
  margin-top:8px;
  font-weight:600;
}

.btn-side{
  display:block;
  margin-top:12px;
  padding:10px;
  background:#fff;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  color:#000;
  font-weight:600;
}

/* CONTENT */

.content{
  padding:30px;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:12px;
  max-width:1200px;
  margin:auto;
}

h2{
  margin-bottom:20px;
}

/* FORM */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  font-weight:600;
  margin-bottom:4px;
}

select,
input{
  padding:10px;
  border-radius:6px;
  border:1px solid #bbb;
}

.row-full{
  grid-column:1/-1;
}

.submit-wrap{
  grid-column:1/-1;
  margin-top:10px;
}

input[type=submit]{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#d9d9d9;
  font-weight:600;
}

.link-voltar{
  grid-column:1/-1;
  text-align:center;
  margin-top:10px;
  display:block;
}

.aluno-row{
  display:flex;
  gap:6px;
}

.add-btn{
  padding:6px 10px;
}

</style>
</head>

<body>

<!-- Sidebar -->

<aside class="sidebar">

<div class="brand">
<img src="{{ url_for('static', filename='loggo.png') }}">
</div>

<div class="profile">

<div class="avatar"
style="
background-image:
url('{{ url_for('static', filename='avatars/' + session['usuario'].replace('@','_at_').replace('.','_') + '.png') }}'),
url('{{ url_for('static', filename='avatar_padrao.png') }}');
">
</div>

<div class="user-name">
{{ (session['nome'] or 'USUÁRIO') | upper }}
</div>

</div>

<a class="btn-side" href="/alterar_senha">Alterar Senha</a>
<a class="btn-side" href="/">Home do Professor</a>

</aside>



<!-- CONTENT -->

<main class="content">

<div class="card">

<h2>Matricular Aluno em Curso</h2>

{% if erro %}
<div class="erro">{{ erro }}</div>
{% endif %}

<form method="post">

<div class="grid">


<div class="field row-full">

<label>Aluno</label>

<div id="alunosContainer">

<div class="aluno-row">

<select name="alunos[]" required>

{% for aluno in alunos %}
<option value="{{ aluno.email }}">{{ aluno.nome }}</option>
{% endfor %}

</select>

<button type="button"
onclick="removerAluno(this)">X</button>

</div>

</div>

<button type="button"
class="add-btn"
onclick="addAluno()">

Adicionar outro aluno

</button>

</div>



<div class="field">

<label>Curso</label>

<select name="curso" required>

{% for curso in cursos %}
<option value="{{ curso.nome }}">{{ curso.nome }}</option>
{% endfor %}

</select>

</div>



<div class="field">

<label>Professor</label>

<select name="professor" required>

{% for prof in professores %}
<option value="{{ prof }}">{{ prof }}</option>
{% endfor %}

</select>

</div>



<div class="field">

<label>Tipo</label>

<select name="tipo">

<option>Inicial</option>
<option>Periódico</option>

</select>

</div>



<div class="field">

<label>Turma</label>

<input type="text"
name="turma"
placeholder="{{ sugestao_turma or '001' }}">

</div>



<div class="field">

<label>NRT</label>

<input type="text"
name="nrt"
required>

</div>



<div class="field">

<label>Periodicidade</label>

<select name="periodicidade">

<option value="1">1 ano</option>
<option value="2">2 anos</option>
<option value="3">3 anos</option>
<option value="5">5 anos</option>

</select>

</div>



<div class="field">

<label>Data Início</label>

<input type="date"
name="data_inicio"
required>

</div>



<div class="field">

<label>Data Fim</label>

<input type="date"
name="data_fim"
required>

</div>



<div class="submit-wrap">

<input type="submit"
value="Matricular">

</div>

<a href="/" class="link-voltar">

Voltar

</a>


</div>

</form>

</div>

</main>



<script>

function addAluno(){

const container =
document.getElementById("alunosContainer")

const select =
container.querySelector("select")

const row =
document.createElement("div")

row.className="aluno-row"

const clone =
select.cloneNode(true)

const btn =
document.createElement("button")

btn.type="button"
btn.innerText="X"

btn.onclick=function(){
removerAluno(btn)
}

row.appendChild(clone)
row.appendChild(btn)

container.appendChild(row)

}

function removerAluno(btn){

const rows =
document.querySelectorAll(".aluno-row")

if(rows.length>1){
btn.parentElement.remove()
}

}

</script>

</body>
</html>
